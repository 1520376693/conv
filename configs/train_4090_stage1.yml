name: DAS_ConvTasNet_4090_stage1_2src
seed: 2026
deterministic: false
gpu_ids: [0]

separator:
  datasets:
    root: /hy-tmp/DAS-dataset
    batch_size: 8
    num_workers: 6
    chunk_size: 10000
    min_sources: 2
    max_sources: 2
    two_source_prob: 1.0
    three_source_prob: 0.0
    amp_range: 0.01
    allow_background: false
    epoch_length: 16000
    val_epoch_length: 4000
    use_diff: true
    smooth_kernel: 1
    same_class_prob: 0.05
    gain_range: [0.65, 1.45]
    max_source_shift: 900
    polarity_flip_prob: 0.08
    add_background_noise: true
    background_noise_prob: 0.45
    background_snr_db: [16.0, 30.0]
    add_white_noise_prob: 0.10
    white_noise_snr_db: [22.0, 36.0]
  net_conf:
    in_channels: 12
    out_channels: 12
    N: 256
    L: 20
    B: 256
    H: 512
    P: 3
    X: 8
    R: 4
    norm: gln
    max_sources: 4
    activate: sigmoid
    dropout: 0.05
    spatial_stem: true
    spatial_depth: 2
    mixture_consistency: false
  train:
    checkpoint: ./checkpoints/separator_stage1_2src
    optimizer: adamw
    scheduler: plateau
    num_epochs: 20
    clip_norm: 5
    min_lr: 1.0e-7
    patience: 4
    factor: 0.5
    early_stop: 8
    use_amp: false
    loss:
      silence_weight: 0.08
      channel_weight: 0.35
      waveform_weight: 0.08
      stft_weight: 0.003
      mix_consistency_weight: 0.08
    optimizer_kwargs:
      lr: 2.0e-4
      weight_decay: 1.0e-4

