name: DAS_ConvTasNet_4090_stage2_2to3src
seed: 2027
deterministic: false
gpu_ids: [0]

separator:
  datasets:
    root: /hy-tmp/DAS-dataset
    batch_size: 8
    num_workers: 6
    chunk_size: 10000
    min_sources: 2
    max_sources: 3
    two_source_prob: 0.55
    three_source_prob: 0.45
    amp_range: 0.01
    allow_background: false
    epoch_length: 20000
    val_epoch_length: 5000
    use_diff: true
    smooth_kernel: 1
    same_class_prob: 0.08
    gain_range: [0.60, 1.55]
    max_source_shift: 1100
    polarity_flip_prob: 0.10
    add_background_noise: true
    background_noise_prob: 0.55
    background_snr_db: [15.0, 29.0]
    add_white_noise_prob: 0.12
    white_noise_snr_db: [21.0, 35.0]
  net_conf:
    in_channels: 12
    out_channels: 12
    N: 256
    L: 20
    B: 256
    H: 512
    P: 3
    X: 8
    R: 4
    norm: gln
    max_sources: 4
    activate: sigmoid
    dropout: 0.05
    spatial_stem: true
    spatial_depth: 2
    mixture_consistency: false
  train:
    checkpoint: ./checkpoints/separator_stage2_2to3src
    init_checkpoint: ./checkpoints/separator_stage1_2src/best.pt
    strict_init: true
    optimizer: adamw
    scheduler: plateau
    num_epochs: 25
    clip_norm: 5
    min_lr: 1.0e-7
    patience: 5
    factor: 0.5
    early_stop: 9
    use_amp: false
    loss:
      silence_weight: 0.08
      channel_weight: 0.35
      waveform_weight: 0.09
      stft_weight: 0.004
      mix_consistency_weight: 0.09
    optimizer_kwargs:
      lr: 1.6e-4
      weight_decay: 1.0e-4

