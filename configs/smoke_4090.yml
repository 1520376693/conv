name: DAS_Smoke_4090
seed: 2026
deterministic: true
gpu_ids: [0]

separator:
  datasets:
    root: /hy-tmp/DAS-dataset
    batch_size: 2
    num_workers: 2
    chunk_size: 4096
    min_sources: 2
    max_sources: 4
    two_source_prob: 0.5
    three_source_prob: 0.3
    amp_range: 0.01
    allow_background: false
    epoch_length: 16
    use_diff: true
    smooth_kernel: 1
    same_class_prob: 0.1
    gain_range: [0.7, 1.3]
    max_source_shift: 256
    polarity_flip_prob: 0.05
    add_background_noise: true
    background_noise_prob: 0.3
    background_snr_db: [18.0, 30.0]
    add_white_noise_prob: 0.1
    white_noise_snr_db: [25.0, 35.0]
  net_conf:
    in_channels: 12
    out_channels: 12
    N: 64
    L: 16
    B: 64
    H: 128
    P: 3
    X: 3
    R: 1
    norm: gln
    max_sources: 4
    activate: relu
    dropout: 0.0
    spatial_stem: true
    spatial_depth: 1
    mixture_consistency: false
  train:
    checkpoint: ./checkpoints/smoke_separator_4090
    optimizer: adamw
    scheduler: plateau
    num_epochs: 1
    clip_norm: 5
    min_lr: 1.0e-7
    patience: 2
    factor: 0.5
    early_stop: 3
    use_amp: true
    loss:
      silence_weight: 0.05
      channel_weight: 0.35
      waveform_weight: 0.05
      stft_weight: 0.0
      mix_consistency_weight: 0.05
    optimizer_kwargs:
      lr: 1.0e-3
      weight_decay: 1.0e-4

classifier:
  datasets:
    root: /hy-tmp/DAS-dataset
    batch_size: 8
    num_workers: 2
    chunk_size: 4096
    use_diff: true
    augment: true
    balanced: true
    aug_gain: [0.8, 1.25]
    aug_noise_prob: 0.2
    aug_snr_db: [20.0, 35.0]
    aug_shift: 256
    aug_time_mask_prob: 0.1
    aug_time_mask_width: 256
    aug_artifact_noise_prob: 0.1
    smooth_kernel: 1
  net_conf:
    num_classes: 6
    dropout: 0.2
    base_channels: 16
  train:
    checkpoint: ./checkpoints/smoke_classifier_4090
    optimizer: adamw
    scheduler: plateau
    num_epochs: 1
    min_lr: 1.0e-7
    patience: 2
    factor: 0.5
    clip_norm: 5
    label_smoothing: 0.02
    optimizer_kwargs:
      lr: 1.0e-3
      weight_decay: 1.0e-4
