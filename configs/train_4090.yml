name: DAS_ConvTasNet_4090
seed: 2026
deterministic: false
gpu_ids: [0]

separator:
  datasets:
    root: /root/DAS-dataset
    batch_size: 8
    num_workers: 6
    chunk_size: 10000
    min_sources: 2
    max_sources: 4
    two_source_prob: 0.45
    three_source_prob: 0.35
    amp_range: 0.01
    allow_background: false
    epoch_length: 40000
    use_diff: true
    smooth_kernel: 1
    same_class_prob: 0.10
    gain_range: [0.55, 1.65]
    max_source_shift: 1200
    polarity_flip_prob: 0.10
    add_background_noise: true
    background_noise_prob: 0.60
    background_snr_db: [14.0, 28.0]
    add_white_noise_prob: 0.15
    white_noise_snr_db: [20.0, 35.0]
  net_conf:
    in_channels: 12
    out_channels: 12
    N: 256
    L: 20
    B: 256
    H: 512
    P: 3
    X: 8
    R: 4
    norm: gln
    max_sources: 4
    activate: relu
    dropout: 0.05
    spatial_stem: true
    spatial_depth: 2
    mixture_consistency: false
  train:
    checkpoint: ./checkpoints/separator_4090
    optimizer: adamw
    scheduler: plateau
    num_epochs: 140
    clip_norm: 5
    min_lr: 1.0e-7
    patience: 6
    factor: 0.5
    early_stop: 28
    use_amp: true
    loss:
      silence_weight: 0.08
      channel_weight: 0.35
      waveform_weight: 0.10
      stft_weight: 0.02
      mix_consistency_weight: 0.10
    optimizer_kwargs:
      lr: 8.0e-4
      weight_decay: 1.0e-4

classifier:
  datasets:
    root: /root/DAS-dataset
    batch_size: 96
    num_workers: 6
    chunk_size: 10000
    use_diff: true
    augment: true
    balanced: true
    aug_gain: [0.8, 1.25]
    aug_noise_prob: 0.30
    aug_snr_db: [18.0, 35.0]
    aug_shift: 800
    aug_time_mask_prob: 0.20
    aug_time_mask_width: 600
    aug_artifact_noise_prob: 0.20
    smooth_kernel: 1
  net_conf:
    num_classes: 6
    dropout: 0.35
    base_channels: 40
  train:
    checkpoint: ./checkpoints/classifier_4090
    optimizer: adamw
    scheduler: plateau
    num_epochs: 140
    min_lr: 1.0e-7
    patience: 8
    factor: 0.5
    clip_norm: 5
    label_smoothing: 0.05
    optimizer_kwargs:
      lr: 8.0e-4
      weight_decay: 1.0e-4
